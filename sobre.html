<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipe Técnica - MAZZ</title>
    <style>
        /* CSS ORIGINAL COM ANIMAÇÕES ADICIONADAS */
        .equipe-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
            font-family: sans-serif;
        }

        .membro-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 300px;
            overflow: hidden; /* Importante para o zoom da foto */
            text-align: center;
            border-bottom: 4px solid #001f3f;
            
            /* --- NOVA ANIMAÇÃO DE LEVANTAR --- */
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
        }

        /* --- EFEITO AO PASSAR O MOUSE (HOVER) --- */
        .membro-card:hover {
            transform: translateY(-15px); /* Levanta o card */
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); /* Sombra mais forte */
        }

        .membro-foto {
            width: 100%;
            height: 320px;
            object-fit: cover;
            background-color: #ddd;
            
            /* --- NOVA ANIMAÇÃO DE ZOOM DA FOTO --- */
            transition: transform 0.5s ease;
        }

        /* --- ZOOM DA FOTO NO HOVER --- */
        .membro-card:hover .membro-foto {
            transform: scale(1.08); /* Aumenta a foto 8% */
        }

        .membro-info {
            padding: 20px;
            color: #333;
            position: relative; /* Garante que o texto fique acima do fundo se necessário */
            z-index: 10;
        }

        .membro-info h4 {
            margin: 0 0 10px 0;
            color: #001f3f;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .membro-info p {
            margin: 5px 0;
            font-size: 0.9rem;
            font-weight: 600;
            color: #666;
        }
    </style>
</head>
<body>

    <h2 style="text-align:center; color: #001f3f; margin-top: 40px; font-family: sans-serif;">NOSSA EQUIPE TÉCNICA</h2>

    <div class="equipe-container">
        
        <div class="membro-card">
            <img src="foto-kesia.jpeg" alt="Foto de Késia Quadros" class="membro-foto">
            <div class="membro-info">
                <h4>KÉSIA DE OLIVEIRA QUADROS</h4>
                <p>GESTORA AMBIENTAL</p>
                <p>CREA: 1523268603PA</p>
            </div>
        </div>

        <div class="membro-card">
            <img src="foto-marcio.jpg" alt="Foto de Márcio Oliveira" class="membro-foto">
            <div class="membro-info">
                <h4>MÁRCIO RODRIGUES DE OLIVEIRA</h4>
                <p>ENGENHEIRO CIVIL</p>
                <p>ENGENHEIRO DE SOFTWARE</p>
                <p>ENGENHEIRO DE SEGURANÇA DO TRABALHO</p>                            
                <p>CREA: 1522223070PA</p>                           
            </div>
        </div>

        <div class="membro-card">
            <img src="foto-ailton.jpg" alt="Foto de Ailton Bartolomeu" class="membro-foto">
            <div class="membro-info">
                <h4>AILTON OLIVEIRA BARTOLOMEU</h4>
                <p>ENGENHEIRO SANITARISTA</p>
                <p>CREA: 15043692246PA</p> 
            </div>
        </div>

    </div>

    <script src="footer.js"></script>

</body>
</html>
